name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typescript:
    name: TypeScript / Node.js 22
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run typecheck
      - run: npm pack --dry-run --json

  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.14']
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: python/pyproject.toml
      - run: python -m pip install --upgrade build twine
      - run: PYTHONPATH=python:. python -m unittest discover -s python -p 'test_*.py'
      - run: python -m build --outdir "$RUNNER_TEMP/python-dist" python
      - run: python -m twine check "$RUNNER_TEMP"/python-dist/*

  rust:
    name: Rust 1.86
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust toolchain
        run: rustup toolchain install 1.86.0 --profile minimal --component rustfmt,clippy
      - run: cargo +1.86.0 fmt --manifest-path rust/Cargo.toml --check
      - run: cargo +1.86.0 test --manifest-path rust/Cargo.toml --locked
      - run: cargo +1.86.0 clippy --manifest-path rust/Cargo.toml --all-targets --locked -- -D warnings
      - run: cargo +1.86.0 package --manifest-path rust/Cargo.toml --locked
